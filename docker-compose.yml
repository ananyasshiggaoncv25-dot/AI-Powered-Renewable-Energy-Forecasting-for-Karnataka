version: "3.9"

services:
  api:
    build: .
    container_name: karnataka-renewable-api
    ports:
      - "8000:8000"
    environment:
      - CORS_ALLOW_ORIGINS=*
      - DATA_PATH=/app/data/processed/featured_generation.csv
      - CHECKPOINT_GLOB=/app/models/tft_best*.ckpt
    volumes:
      - .:/app:ro
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: karnataka-renewable-frontend
    ports:
      - "8080:8080"
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://api:8000
